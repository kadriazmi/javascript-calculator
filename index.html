<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <p class="js-calculation calculation-txt"></p>
  <p>
    <button onclick="
        updateCalculation('1');
      " class="calculator-btn gray-btn">1</button>

    <button onclick="
        updateCalculation('2');
      " class="calculator-btn gray-btn">2</button>

    <button onclick="
        updateCalculation('3');
      " class="calculator-btn gray-btn">3</button>

    <button onclick="
        updateCalculation(' + ');
      " class="calculator-btn orange-btn">+</button>
  </p>

  <p>
    <button onclick="
        updateCalculation('4');
      " class="calculator-btn gray-btn">4</button>

    <button onclick="
        updateCalculation('5');
      " class="calculator-btn gray-btn">5</button>

    <button onclick="
        updateCalculation('6');
      " class="calculator-btn gray-btn">6</button>

    <button onclick="
        updateCalculation(' - ');
      " class="calculator-btn orange-btn">-</button>
  </p>

  <p>
    <button onclick="
        updateCalculation('7');
      " class="calculator-btn gray-btn">7</button>

    <button onclick="
        updateCalculation('8');
      " class="calculator-btn gray-btn">8</button>

    <button onclick="
        updateCalculation('9');
      " class="calculator-btn gray-btn">9</button>

    <button onclick="
        updateCalculation(' * ');
      " class="calculator-btn orange-btn">*</button>
  </p>

  <p>
    <button onclick="
        updateCalculation('0');
      " class="calculator-btn gray-btn">0</button>

    <button onclick="
        updateCalculation('.');
      " class="calculator-btn gray-btn">.</button>

    <button onclick="

        calculation = eval(calculation);
        displayCalculation ();
        localStorage.setItem('Calculation', calculation);
      " class="calculator-btn gray-btn">=</button>

    <button onclick="
        updateCalculation(' / ');
      " class="calculator-btn orange-btn">/</button>
  </p>

  <p>
    <button onclick="
        calculation = '';
        localStorage.setItem('Calculation', calculation);
        displayCalculation ();
      " class="calculator-btn gray-btn clear-btn">Clear</button>
  </p>



  <script src="script.js"></script>
</body>

</html>
